name: Publish MSK Exam 3 Platform

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/publish-platform.yml

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download platform HTML
        env:
          SOURCE_URL: "https://sdmntprwestus3.oaiusercontent.com/files/00000000-49f4-71fd-9710-84da1c0c90b4/raw?se=2026-05-23T17:19:54Z&sp=r&sv=2026-02-06&sr=b&scid=3200f936-cd42-430c-9b43-56ed0b90821f&skoid=c69179d1-5b5d-430f-afa3-b9bdcf9d6497&sktid=a48cca56-e6da-484e-a814-9c849652bcb3&skt=2026-05-23T06:36:00Z&ske=2026-05-25T06:36:00Z&sks=b&skv=2026-02-06&sig=p6hS2t0GBgMJF4OxIQGPgQoZwfZR7vycpCfvYlu4G5s%3D"
        run: |
          curl -L --fail --retry 3 --retry-delay 2 "$SOURCE_URL" -o index.html
          test -s index.html

      - name: Commit platform file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Publish MSK exam 3 platform" || exit 0
          git push
